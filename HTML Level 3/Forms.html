<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms in HTML</title>
</head>
<body>
    <h3>Action Attribute, Input, Placeholder, Label, Buttons, Name Attribute</h3>
    <!-- Action Attribute -->
    <form action="/action">
        <label for="username">Name: </label>
        <!-- INPUT, PLACEHOLDER, LABEL, BUTTONS, NAME ATTRIBUTE -->
        <input type="text" placeholder="Enter Full Name" id="username" name="username">
        <br>
        <label for="age">DOB: </label>
        <input type="date" placeholder="DOB" id="age" name="DOB">
        <br>
        <label for="pass">Password: </label>
        <input type="password" placeholder="Enter Password" id="pass">
        <br>
        <button>Submit</button>
    </form>
    <h4>PQS</h4>
    <form action="https://www.google.com/search">
        <label for="Google">Search On Google =></label>
        <input type="text" id="Google" placeholder="Search" name="q">
        <button type="submit">Submit</button>
        <button type="reset">Reset</button>
    </form>
    <form action="/action">
        <h3>Checkbox</h3>
        <!-- CHECKBOX -->
        <input type="checkbox" id="age" name="age" value="18 above" checked>
        <label for="age">I am 18+</label>
        <br>
        <h3>Radio Button</h3>
        <!-- RADIO BUTTON -->
        <label>Gender: </label>
        <label for="Male">Male</label>
        <input type="radio" id="Male" name="gender" value="Male">
        <label for="Female">Female</label>
        <input type="radio" id="Female" name="gender" value="Female">
        <label for="Other">Other</label>
        <input type="radio" id="Other" name="gender" value="Other">
        <button type="submit">Submit</button>
        <br>
        <h3>Select Element</h3>
        <!-- SELECT ELEMENT -->
        <label for="profession">Choose Your Profession:</label>
        <select id="profession" name="Profession">
            <option selected>Select your option</option>
            <option value="Student">Student</option>
            <option value="Developer">Developer</option>
        </select>
        <br>
        <h3>Range Element</h3>
        <!-- RANGE ELEMENT -->
        <input type="range" id="vol" min="0" max="100" step="10" value="50" name="Volume">
        <label for="vol"> Volume</label>
        <button type="submit">Submit</button>
        <br>
        <h3>Textarea</h3>
        <!-- TEXTAREA -->
        <label for="feedback">Please Provide yoour feedback:</label>
        <textarea id="feedback" name="feedback" rows="5" cols="10"></textarea>
        <button type="submit">Submit</button>
    </form>
    <h4>PQS</h4>
    <form action="/action">
        <h5>Registration Form</h5>
        <label for="fname"></label>
        <input type="text" id="fname" name="First name" placeholder="First Name">
        <label for="lname"></label>
        <input type="text" id="lname" name="Last name" placeholder="Last Name">
        <br>
        <label for="gender">Please Select Your Gender</label>
        <select id="gender" name="gender">
            <option value="Male">Male</option>
            <option value="Female">Female</option>
            <option value="Other">Other</option>
        </select>
        <br>
        <label>Do you agree to all terms of service</label>        
        <input type="checkbox" id="agree" checked name="Yes">
        <label for="agree">Yes, I agree</label>
        <br>
        <button type="submit">Register</button>
    </form>
</body>
</html>
